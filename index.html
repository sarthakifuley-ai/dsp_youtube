<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Trending Video Dashboard</title>
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #000000, #fad0c4);
    }
    .dashboard {
      text-align: center;
      padding: 20px;
      transition: transform 0.1s ease;
      perspective: 1000px;
    }
    h1 {
      color: #fff;
      text-shadow: 2px 2px 8px #000;
    }
    select {
      margin: 20px 0;
      padding: 10px 15px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      outline: none;
      cursor: pointer;
    }
    .chart {
      margin: 40px auto;
      background: rgba(255, 255, 255, 0.1);
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 15px 25px rgba(0,0,0,0.2);
      transition: transform 0.2s;
      max-width: 90%;
    }
    .chart:hover {
      transform: scale(1.02);
    }
  </style>
</head>
<body>
  <div id="dashboard" class="dashboard">
    <h1>YouTube Trending Video Dashboard</h1>
    <select id="categoryFilter">
      <option value="">All Categories</option>
    </select>
    <div id="barChart" class="chart"></div>
    <div id="scatterChart" class="chart"></div>
    <div id="channelChart" class="chart"></div>
  </div>

  <script>
    const categoryMap = {
      1: "Film & Animation", 2: "Autos & Vehicles", 10: "Music",
      15: "Pets & Animals", 17: "Sports", 19: "Travel & Events",
      20: "Gaming", 22: "People & Blogs", 23: "Comedy",
      24: "Entertainment", 25: "News & Politics", 26: "Howto & Style",
      27: "Education", 28: "Science & Technology", 29: "Nonprofits & Activism"
    };

    let data = [];

    // Load CSV
    Papa.parse("youtube.csv", {
      download: true,
      header: true,
      dynamicTyping: true,
      complete: function(results) {
        data = results.data;
        data.forEach(row => row.category_name = categoryMap[row.category_id]);

        // Populate dropdown
        const categories = Array.from(new Set(data.map(d => d.category_name))).sort();
        const select = document.getElementById("categoryFilter");
        categories.forEach(cat => {
          const option = document.createElement("option");
          option.value = cat;
          option.textContent = cat;
          select.appendChild(option);
        });

        drawCharts();
      }
    });

    // 3D cursor tilt
    const dashboard = document.getElementById("dashboard");
    window.addEventListener("mousemove", e => {
      const x = (e.clientX / window.innerWidth - 0.5) * 20;
      const y = (e.clientY / window.innerHeight - 0.5) * 20;
      dashboard.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
    });

    document.getElementById("categoryFilter").addEventListener("change", drawCharts);

    function drawCharts() {
      const selectedCategory = document.getElementById("categoryFilter").value;
      const filtered = selectedCategory ? data.filter(d => d.category_name === selectedCategory) : data;

      // Most Popular Categories
      const catCounts = {};
      data.forEach(d => catCounts[d.category_name] = (catCounts[d.category_name] || 0) + 1);
      Plotly.newPlot("barChart", [{
        x: Object.keys(catCounts),
        y: Object.values(catCounts),
        type: 'bar',
        marker: {color: 'orange'}
      }], {title: "Most Popular Categories"});

      // Views vs Likes
      Plotly.newPlot("scatterChart", [{
        x: filtered.map(d => d.views),
        y: filtered.map(d => d.likes),
        mode: 'markers',
        type: 'scatter',
        marker: {color: 'green'}
      }], {title: "Views vs Likes Correlation"});

      // Top Channels
      const channelCounts = {};
      filtered.forEach(d => channelCounts[d.channel_title] = (channelCounts[d.channel_title] || 0) + 1);
      const topChannels = Object.entries(channelCounts).sort((a,b) => b[1]-a[1]).slice(0,10);
      Plotly.newPlot("channelChart", [{
        x: topChannels.map(d=>d[0]),
        y: topChannels.map(d=>d[1]),
        type: 'bar',
        marker: {color: 'purple'}
      }], {title: "Top Channels"});
    }
  </script>
</body>
</html>
